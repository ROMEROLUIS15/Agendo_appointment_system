name: Send Appointment Reminders

on:
  schedule:
    # Runs every 15 minutes — compensates for Vercel Hobby 1-cron-per-day limit
    - cron: '*/15 * * * *'
  # Allow manual trigger from GitHub Actions UI for testing
  workflow_dispatch:

jobs:
  send-reminders:
    name: Trigger reminder cron
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Call /api/cron/send-reminders
        env:
          APP_URL:     ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          HTTP_STATUS=$(curl --silent --output /dev/null --write-out "%{http_code}" \
            --max-time 30 \
            -X GET "$APP_URL/api/cron/send-reminders" \
            -H "Authorization: Bearer $CRON_SECRET")

          echo "HTTP status: $HTTP_STATUS"

          if [ "$HTTP_STATUS" -ne 200 ]; then
            echo "ERROR: API returned status $HTTP_STATUS"
            exit 1
          fi

          echo "Reminders dispatched successfully."
